<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Do You Love Me? Golu ji?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #ffe6eb;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 100px;
      color: #ff4d6d;
    }

    .buttons {
      margin-top: 40px;
      position: relative;
      height: 200px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      position: absolute;
    }

    #yesBtn {
      background-color: #28a745;
      color: white;
      left: 40%;
    }

    #noBtn {
      background-color: #dc3545;
      color: white;
      left: 55%;
    }

    #message {
      margin-top: 30px;
      font-size: 24px;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>Do you love me? Shivani 😳</h1>

  <div class="buttons">
    <button id="yesBtn">Yes ❤️</button>
    <button id="noBtn">No 💔</button>
  </div>

  <div id="message"></div>

  <script>
   const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const message = document.getElementById("message");

let noCount = 0;

const noMessages = [
  "Phir se soch lo shivani 😏",
  "Achha nahi hoga sweetheart 😌",
  "Kiss nahi karunga 😘❌",
  "Hug bhi nahi 🤗❌",
  "Milunga bhi nahi 😤",
  "Chal ab haan bol do ❤️"
];

yesBtn.addEventListener("click", () => {
  message.innerHTML = "I knew it 😍❤️ You're mine!Ab milogi to sab dunga ";
});

noBtn.addEventListener("click", () => {
  if (noCount < noMessages.length) {
    message.innerHTML = noMessages[noCount];
    noCount++;
  } else {
    message.innerHTML = "Ab toh maan jao 😭❤️";
  }

  // optional: move button randomly after click
  const x = Math.random() * window.innerWidth * 0.7;
  const y = Math.random() * window.innerHeight * 0.5;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});
  </script>

</body>
</html>
