<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Do You Love Me?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #ffe6eb;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 100px;
      color: #ff4d6d;
    }

    .buttons {
      margin-top: 40px;
      position: relative;
      height: 200px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      position: absolute;
    }

    #yesBtn {
      background-color: #28a745;
      color: white;
      left: 40%;
    }

    #noBtn {
      background-color: #dc3545;
      color: white;
      left: 55%;
    }

    #message {
      margin-top: 30px;
      font-size: 24px;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>Do you love me? 😳</h1>

  <div class="buttons">
    <button id="yesBtn">Yes ❤️</button>
    <button id="noBtn">No 💔</button>
  </div>

  <div id="message"></div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const message = document.getElementById("message");

    yesBtn.addEventListener("click", () => {
      message.innerHTML = "I knew it 😍❤️ You're stuck with me now!";
    });

    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * window.innerWidth * 0.8;
      const y = Math.random() * window.innerHeight * 0.6;

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });
  </script>

</body>
</html>
